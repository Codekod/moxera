name: Quality Checks

on:
  push:
    branches: [master]
  pull_request:

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Visual regression
        run: npm run test:e2e

      - name: Lighthouse CI
        run: npm run lhci:ci
